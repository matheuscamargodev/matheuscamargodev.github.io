<div class="container">
  <div class="row">
    <div class="col-sm-7">
      <pokemon-barra-pesquisa
        (limpar)="limparCampoPesquisa()"
        [loading]="loading"
        (pesquisar)="pesquisarPokemons($event)"
      ></pokemon-barra-pesquisa>
    </div>
    <div class="col-sm-5">
      <pokemon-radio-animado
        (spriteAnimado)="setSpriteAnimado($event)"
      ></pokemon-radio-animado>
    </div>
  </div>

  <div class="pokedex">
    <div *ngFor="let pokemon of pokemonLista">
      <pokemon-lista-card
        [pokemon]="pokemon"
        [spriteAnimado]="spriteAnimado"
      ></pokemon-lista-card>
    </div>
  </div>
</div>
<div class="paginacao">
  <button (click)="previousPage()" [disabled]="offset === 0">Anterior</button>
  {{ pagina }}
  <button (click)="nextPage()">Próxima</button>
</div>
